port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
unified-delay: true
sniffer:
  sniff:
    TLS: {ports: [1-65535], override-destination: true}
    HTTP: {ports: [1-65535], override-destination: true}
  enable: true
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
  parse-pure-ip: false
  force-dns-mapping: true
  override-destination: true
dns:
  ipv6: false
  enable: true
  listen: 0.0.0.0:1053
  use-hosts: false
  nameserver-policy:
   "geosite:cn":
    - 223.5.5.5
    - 223.6.6.6
    - 119.29.29.29
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - tcp://8.8.8.8
  fake-ip-range: 198.18.0.1/15
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
     - gfw
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
