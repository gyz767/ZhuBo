dns:
  nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://dns.google/dns-query#🚀 节点选择
    - https://mozilla.cloudflare-dns.com/dns-query#🚀 节点选择
    - 1.1.1.1#🚀 节点选择
  fallback-filter:
    geoip: true
    geoip-code: CN
proxy-providers:
  tzvkfmabrxko:
    type: http
    url: "https://url_Example.yaml"
    proxy: DIRECT
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 900
proxy-providers-config:
  proxy-providers-use: &proxy-providers-use
    - tzvkfmabrxko
port: 7890
socks-port: 7891
allow-lan: true
mode: rule

pr: &pr
  proxies:  
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - ✌手动切换
      - ♻️ 自动选择
      - DIRECT
      
#====↓↓↓下面填写节点名称，注意和上面↑↑对齐，注意是添加节点名称！不是节点信息
    





proxies:   #↓↓下面填入节点信息




rules:
  - RULE-SET,private_ip,🎯 全球直连,no-resolve
  - RULE-SET,ads_domain,🛑 广告拦截
  - RULE-SET,twitter_domain,🐦Twitter
  - RULE-SET,youtube_domain,📹 油管视频
  - RULE-SET,telegram_domain,✈️Telegram
  - RULE-SET,netflix_domain,🎬NETFLIX
  - RULE-SET,bilibili_domain,📺哔哩哔哩
  - RULE-SET,bahamut_domain,🕹️巴哈姆特
  - RULE-SET,Apple,🍎Apple
  - RULE-SET,Tiktok,📱Tiktok
  - RULE-SET,Disney,🏰 Disney
  - RULE-SET,HBO,🍿 HBO
  - RULE-SET,Steam,🎮 Steam
  - RULE-SET,Paypal,💰 PayPal
  - RULE-SET,OpenAI,💬 OpenAi
  - RULE-SET,cn_domain,🎯 全球直连
  - RULE-SET,geolocation-!cn,🐟 漏网之鱼
  - RULE-SET,twitter_ip,🐦Twitter
  - RULE-SET,telegram_ip,✈️Telegram
  - RULE-SET,netflix_ip,🎬NETFLIX
  - RULE-SET,cn_ip,🎯 全球直连
  - MATCH,🐟 漏网之鱼
proxy-groups:
  - name: 🚀 节点选择
    type: select
    <<: *pr
    
  - name: ✌手动切换
    type: select
    use: *proxy-providers-use
        
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use: *proxy-providers-use
  - name: 🎮 Steam
    type: select
    <<: *pr


  - name: ✈️Telegram
    type: select
    <<: *pr


  - name: 🐦Twitter
    type: select
    <<: *pr
    

  - name: 📱Tiktok
    type: select
    <<: *pr   
    

  - name: 🍎Apple
    type: select
    <<: *pr
    

  - name: 📺哔哩哔哩
    type: select
    <<: *pr


  - name: 🕹️巴哈姆特
    type: select
    <<: *pr


  - name: 🎬NETFLIX
    type: select
    <<: *pr


  - name: 🏰 Disney
    type: select
    <<: *pr


  - name: 🍿 HBO
    type: select
    <<: *pr


  - name: 💰 PayPal
    type: select
    <<: *pr
    

  - name: 📹 油管视频
    type: select
    <<: *pr


  - name: 💬 OpenAi
    type: select
    <<: *pr


  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use: *proxy-providers-use
    filter: (?i)香港|香江|Hong Kong|HK|🇭🇰|Hongkong
    
  - name: 🇹🇼 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use: *proxy-providers-use
    filter: (?i)台湾|台灣|Taiwan|TW|🇹🇼

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use: *proxy-providers-use
    filter: (?i)日本|JP|Japan|🇯🇵|Tokyo

  - name: 🇸🇬 狮城节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use: *proxy-providers-use
    filter: (?i)新加坡|SG|Singapore|🇸🇬

  - name: 🇺🇲 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    use: *proxy-providers-use
    filter: (?i)美国|US|United States|🇺🇸|California|New York

  - name: 🇰🇷 韩国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    use: *proxy-providers-use
    filter: (?i)韩国|KR|Korea|🇰🇷|Seoul
