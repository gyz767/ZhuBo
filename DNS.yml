port: 7890
socks-port: 7891
allow-lan: true
ipv6: false
mode: Rule
log-level: info
external-controller: :9090
unified-delay: true

experimental:
  sniff-tls-sni: true
  
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.localdomain"
    - "*.home.arpa"
    - "+.msftconnecttest.com" 
    - "+.msftncsi.com"
    - "+.stun.playstation.net" 
    - "*.srv.nintendo.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"
    - "*.teafone.com"
    - "*.sktswe.net"
    - rtc.goodfone.co.kr
    - "*.chattti.com"  
    
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 223.6.6.6

  fallback:
    - 1.1.1.1
    - 1.0.0.1
    - 8.8.8.8
    
  fallback-filter:
    geoip: true
    geoip-code: CN

