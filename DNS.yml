port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
unified-delay: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
clash-for-android:
  append-system-dns: false
profile:
  tracing: true
experimental:
  sniff-tls-sni: true
# TUN 模式配置 (全虚拟网卡接管)
#---------------------------------------------------#
tun:
  enable: true
  stack: system           # 建议 Windows 用户使用 system，mac/linux 可选 gvisor
  dns-hijack:
    - any:53              # 劫持所有 53 端口流量到 Clash DNS
  auto-route: true        # 自动设置系统路由，使流量进入 TUN 网卡
  auto-detect-interface: true # 自动检测物理网卡，防止环路
  mtu: 1380
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  fake-ip-filter:
    - "*.lan"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"
    - "*.teafone.com"
    - "*.sktswe.net"
    - rtc.goodfone.co.kr
    - "*.chattti.com"
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - tls://223.5.5.5:853
    - tls://223.6.6.6:853
    - tls://120.53.53.53
    - tls://1.12.12.12
  fallback:
    - 1.1.1.1   
    - 8.8.8.8
    - tls://dns.google    
