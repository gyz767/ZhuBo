port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
unified-delay: true

sniffer:
  enable: true
  parse-pure-ip: false
  force-dns-mapping: true
  override-destination: true
  sniff:
    TLS:
      ports: [1-65535]
      override-destination: true
    HTTP:
      ports: [1-65535]
      override-destination: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback:
    - 8.8.8.8
    - 1.0.0.1

  fallback-filter:
    geoip: false

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.localdomain"
    - "*.home.arpa"
