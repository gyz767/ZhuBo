port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
unified-delay: true
tun:
  dns-hijack:
    - any:53
experimental:
  sniff-tls-sni: true

sniffer:
  enable: true
  parse-pure-ip: false
  force-dns-mapping: true
  override-destination: true
  sniff:
    TLS:
      ports: [1-65535]
      override-destination: true
    HTTP:
      ports: [1-65535]
      override-destination: true
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.localdomain"
    - "*.home.arpa"
