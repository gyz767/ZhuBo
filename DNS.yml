port: 7890
socks-port: 7891
allow-lan: true
ipv6: true
mode: Rule
log-level: info
external-controller: :9090
unified-delay: true

experimental:
  sniff-tls-sni: true
  protocol-sniffer:
    enable: true
    force-domain:
      - "turn.icf-prod-sound.generflow.com"
      - "+.generflow.com"
      - "+.streamatemodels.com"
    sniff:
      TLS:
        ports: [443, 8443]
      HTTP:
        ports: [80, 8080-8888]
      QUIC:
        ports: [443, 8443]
  
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.localdomain"
    - "*.home.arpa"
    - "+.msftconnecttest.com" 
    - "+.msftncsi.com"
    - "+.stun.playstation.net" 
    - "*.srv.nintendo.net"
    - xbox.*.microsoft.com
    - "*.xboxlive.com"
    - "*.teafone.com"
    - "*.sktswe.net"
    - rtc.goodfone.co.kr
    - "*.chattti.com"  

# 强制推流域名走国外解析，防止国内 DNS 把 IP 指向直连路径
  nameserver-policy:
    "turn.icf-prod-sound.generflow.com": [https://dns.google/dns-query]
    "+.generflow.com": [https://dns.google/dns-query]
    "+.streamatemodels.com": [https://dns.google/dns-query]
    
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 223.6.6.6

  fallback:
    - 1.1.1.1
    - 1.0.0.1
    - 8.8.8.8
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

